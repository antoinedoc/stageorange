 <!doctype html>
<html lang="fr">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"> 
    <meta http-equiv="Pragma" content="no-cache"> <meta http-equiv="Expires" content="0"> 
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Mon site de badminton</title>
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" je suis là />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
  rel="stylesheet" />
</head>
<body>
  <div class="login-page">
    <h1>Connexion</h1>
    <form class="login-form">
      <div>
        <label for="username">Nom d'utilisateur&nbsp;:</label>
        <br>
        <input type="text" id="username" name="username" required />
      </div>

      <div>
        <label for="userPassword">Mot de passe (14 caractères)&nbsp;:</label>
        <br>
        <input type="password" id="userPassword" name="password" minlength="4" maxlength="20" required />
      </div>

      <div>
        <input type="submit" value="Se connecter" />
      </div>
    </form>
  </div>

  <script>
 const PREDEFINED_USERNAME_mathieu = "mathieu";
const PREDEFINED_PASSWORD_mathieu = "19812010*2";
 const PREDEFINED_USERNAME_antoine = "antoine";
const PREDEFINED_PASSWORD_antoine = "1111";
const PREDEFINED_USERNAME_thomas = "thomas";
const PREDEFINED_PASSWORD_thomas = "2222";

const users = [
  { username: PREDEFINED_USERNAME_mathieu, password: PREDEFINED_PASSWORD_mathieu, prenom: 'Mathieu' },
  { username: PREDEFINED_USERNAME_antoine, password: PREDEFINED_PASSWORD_antoine, prenom: 'Antoine' },
  { username: PREDEFINED_USERNAME_thomas, password: PREDEFINED_PASSWORD_thomas, prenom: 'Thomas' }
];

document.querySelector('.login-form').addEventListener('submit', function(event) {
  event.preventDefault();
   const enteredPassword = document.getElementById('userPassword').value;
  const enteredusername = document.getElementById('username').value;

  const matchedUser = users.find(u =>
    u.username === enteredusername && u.password === enteredPassword
  );

  if (matchedUser) {
    window.location.href = `mapageprotegee.html?prenom=${encodeURIComponent(matchedUser.prenom)}`;
  } else {
    alert('Accès refusé.');
  }
});
  </script>
</body>
</html>
