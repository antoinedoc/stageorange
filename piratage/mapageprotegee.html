<!doctype html>
<html lang="fr">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Page protégée</title>
    <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <div class="protected-page">
    <h1>Accès autorisé</h1>
   <h1 id="greeting">Accès autorisé</h1>

<script>
  const params = new URLSearchParams(window.location.search);
  const prenom = params.get('prenom');
  const greetingElement = document.getElementById('greeting');

  if (prenom) {
    greetingElement.textContent = `Bonjour ${prenom}`;
  } else {
    greetingElement.textContent = 'Bonjour invité';
  }
</script>
    
    <p><a href="mapagedeconnexion.html">Retour à la page de connexion</a></p>
  </div>

</body>
</html>
